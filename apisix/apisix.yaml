# ──────────────────────────────────────────────────────────────────────────
# APISIX 声明式配置（standalone / config_provider: yaml）
# 本文件即「配置即代码」的唯一事实源(SoT)：可版本化、可 yamllint、保存即热加载。
# APISIX 周期性检测本文件 mtime（约 1s）并自动 reload——无需重启、无需 etcd。
# 末尾的 #END 是 standalone 模式的必需结束标记，请勿删除。
# ──────────────────────────────────────────────────────────────────────────

# 🌱 部署级可注入点 ①：上游目标。
# 本地 compose 自洽值 = mock-upstream（go-httpbin，回显请求头便于冒烟断言）。
# 集群部署时由主仓 deploy/charts/gateway 经 values→ConfigMap 渲染为**真实 in-cluster governance**
# （chart 默认 `governance:8082`；跨 ns 用 FQDN `governance.<ns>.svc:8082`）——
# 本文件不复制集群值（避免双源/漂移），集群目标唯一事实源 = chart `values.upstreams.governance.*`。
# 两条路径差异见 README.md「本地 compose vs 集群（部署级注入点）」。
upstreams:
  - id: mock-upstream
    name: mock-upstream
    type: roundrobin
    nodes:
      "mock-upstream:8080": 1

  # 🌱 部署级可注入点 ③：privacy 编排层（隐私计算）上游。
  # 本地 compose 自洽值 = privacy-mock（go-httpbin，**带 `-prefix=/api`**——见下方 privacy-api 路由注释）。
  # 集群部署时由主仓 deploy/charts/gateway 经 values→ConfigMap 渲染为**真实 privacy 编排层**
  # （chart `values.upstreams.privacy.*`，固定 Service 名 `privacy-orchestrator-java:8086`）。
  # 与 chart 一致：privacy 是**独立 upstream**（非复用 mock-upstream），结构镜像 chart `configmap.yaml` 的 privacy-upstream。
  - id: privacy-upstream
    name: privacy-upstream
    type: roundrobin
    nodes:
      "privacy-mock:8080": 1

# 共享插件链：OIDC 校验 + 租户上下文注入 + 身份/角色注入 + 审计。受保护路由统一引用，避免重复（DRY）。
# 🔒 openid-connect 与 tenant-context / identity-context 必须成对出现：前者验签并注入 X-Userinfo，
#    后二者据此分别注入 X-Tenant-*（租户隔离根）与 X-User/X-Roles（方法级 RBAC 根）。
plugin_configs:
  - id: auth-tenant
    desc: "OIDC 校验 → 注入 X-Tenant-* + X-User/X-Roles → 审计（受保护路由共享）"
    plugins:
      openid-connect:
        client_id: apisix
        # 公开客户端 + JWKS 本地验签，不使用该密钥；此处仅为 schema 占位，非敏感信息。
        client_secret: "local-dev-unused-bearer-jwks"
        # 🌱 部署级可注入点 ②：OIDC discovery（in-cluster Keycloak）。
        # 本地 compose 与 chart 默认恰好同名 Service `keycloak:8080`，故下方字符串两路径一致；
        # 集群值仍由 chart `values.oidc.discovery` 注入为唯一事实源（跨 ns 用 FQDN `keycloak.<ns>.svc:8080`）。
        # 集群侧用应用容器端口 8080（基线 8180 仅宿主/dev 暴露，勿写进集群 discovery）。
        discovery: "http://keycloak:8080/realms/hashmatrix/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        scope: openid
        set_userinfo_header: true   # 校验通过后注入 X-Userinfo（tenant-context 据此取租户，并覆盖客户端伪造值）
      tenant-context:
        userinfo_header: X-Userinfo
        tenant_claim: organization            # 全部 org membership（单/多项）
        active_tenant_claim: active_organization  # org-scoped token 选定的活动 org（§3.4 优先）
        fallback_claim: tenant
        require_tenant: true
      # identity-context：据同一 X-Userinfo 注入 X-User(sub)/X-Roles(realm roles)，供应用方法级 RBAC。
      identity-context:
        userinfo_header: X-Userinfo
        roles_claim: roles                    # realm-roles 映射器写入 userinfo 的 claim（见 realm-export.json）
        require_identity: true
      audit-log: {}

routes:
  # ── 受保护路由：共享 auth-tenant 链 + 按租户限流（每租户 100/min） ──
  # 验收：无 token → 401；合法 token → 200，且上游可见 X-Tenant-*。
  - id: protected-api
    name: protected-api
    desc: "受保护 API——租户上下文进入系统的第一道关"
    uri: /api/*
    upstream_id: mock-upstream
    plugin_config_id: auth-tenant
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/(.*)", "/$1"]
      limit-count:
        count: 100
        time_window: 60
        key_type: var
        key: tenant_id            # 注入后的可信租户变量（非 http_x_tenant_id，后者读客户端原始头）
        rejected_code: 429
        policy: local
        allow_degradation: true

  # ── privacy 受保护路由：复用 auth-tenant 链注入 X-Tenant-*，路由到隐私计算编排层 ──
  # 结构镜像主仓 chart `configmap.yaml` 的 privacy-api（集群 SoT）；本地仅把上游换成 privacy-mock。
  # priority 高于 protected-api（/api/* 兜底，默认 priority 0），确保 /api/privacy/* 不被通配抢走。
  # rewrite **保留 /api 前缀**（→ /api/$1）——编排层对外端点为 /api/v1/psi/*（契约见主仓
  #   contracts/openapi/privacy-orchestrator-v1.yaml）；客户端经 /api/privacy/v1/psi/intersect 访问。
  # 本地 privacy-mock 以 go-httpbin `-prefix=/api` 起，故 rewrite 与集群**逐字一致**仍能命中 echo 端点。
  # ⚠️ 改本路径/rewrite 时，须同步主仓 chart configmap.yaml 与 privacy 契约（三处一致，防漂移）。
  - id: privacy-api
    name: privacy-api
    desc: "privacy 隐私计算编排层——经网关注入 X-Tenant-* 后路由到 privacy-upstream"
    uri: /api/privacy/*
    priority: 10
    upstream_id: privacy-upstream
    plugin_config_id: auth-tenant
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/privacy/(.*)", "/api/$1"]

  # ── 组织成员自管理（租户自管理面）：结构镜像主仓 chart `configmap.yaml` 的 control-plane-members-api（集群 SoT）──
  # 本地仅把上游换成 mock-upstream（echo）。集群侧 control-plane 同前缀下既有 /api/v1/*（require_tenant=false，
  # superadmin 跨租户管理面），故 chart 用 priority 11 > 10 + require_tenant=true 把成员面与之区分；本地无该 false 覆盖，
  # 此路由主要为**结构对齐 + 冒烟可断言**（成员面 require_tenant=true、注入 X-Tenant-*）。契约见主仓 contracts/openapi/
  # control-plane-v1.yaml /v1/org/members（#57）；require_tenant 继承 auth-tenant 默认 true（不覆盖 tenant-context）。
  # ⚠️ 改本路径时须同步主仓 chart control-plane-members-api（防漂移）。
  - id: control-plane-members-api
    name: control-plane-members-api
    desc: "组织成员自管理（租户自管理 · require_tenant=true）——镜像集群 SoT，本地路由到 mock-upstream"
    uris: ["/api/v1/org/members", "/api/v1/org/members/*"]
    priority: 11
    upstream_id: mock-upstream
    plugin_config_id: auth-tenant

  # ── 限流样例：按租户维度，count=2/60s，便于冒烟验证「每租户独立配额」 ──
  - id: ratelimit-demo
    name: ratelimit-demo
    desc: "限流样例（按租户 2/60s）"
    uri: /ratelimit/*
    upstream_id: mock-upstream
    plugin_config_id: auth-tenant
    plugins:
      proxy-rewrite:
        regex_uri: ["^/ratelimit/(.*)", "/$1"]
      limit-count:
        count: 2
        time_window: 60
        key_type: var
        key: tenant_id
        rejected_code: 429
        policy: local

  # ── admin 平面：OIDC 校验但不要求租户（superadmin 不绑 org，无租户上下文） ──
  # 复用 auth-tenant 的 openid-connect/audit-log（单一事实源），仅在路由级覆盖 tenant-context
  # 关闭租户强制——路由级同名插件优先于 plugin_config，整块替换、其余字段沿用插件默认。
  # 验收：superadmin（无 org claim）放行 200 且不被错注 X-Tenant-*；同一身份打租户路由仍 fail-closed 403。
  - id: admin-api
    name: admin-api
    desc: "admin/superadmin 平面——OIDC 校验、无租户上下文"
    uri: /admin/*
    upstream_id: mock-upstream
    plugin_config_id: auth-tenant
    plugins:
      proxy-rewrite:
        regex_uri: ["^/admin/(.*)", "/$1"]
      tenant-context:
        require_tenant: false   # 其余字段沿用插件默认（与 auth-tenant 一致）；admin 平面无租户即放行

  # ── 公共路由：无需认证（开放/健康端点示例），并用于热加载演示 ──
  - id: public-open
    name: public-open
    desc: "公共开放端点（无鉴权）"
    uri: /public/*
    upstream_id: mock-upstream
    plugins:
      proxy-rewrite:
        regex_uri: ["^/public/(.*)", "/$1"]
      response-rewrite:
        headers:
          set:
            X-Gateway-Env: local-dev   # scripts/hot-reload.sh 翻转此值以演示热加载
      audit-log: {}
#END
